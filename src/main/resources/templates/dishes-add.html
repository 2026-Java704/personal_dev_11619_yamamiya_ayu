<!DOCTYPE html>
<xmlns:th="http://www.thymeleaf.org">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.css" rel="stylesheet">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js" defer
		type="text/javascript"></script>

	<head>
		<meta charset="UTF-8">
		<title>食事バランスガイド</title>
		<link rel="stylesheet" href="/css/style.css">
	</head>

	<body>
		<header th:replace="~{header}"></header>
		<main>
			<div class="box">
				<h2>新規登録</h2>


				<form action="/dishes/add" method="post">

					<ul th:if="${errorList}" class="error">
						<li th:each="error:${errorList}" th:text="${error}"></li>
					</ul>

					<div style="float:left;">
						<a href="https://www.sakulife-ikari.com/wp-content/uploads/2021/05/food2102_7.png"
							data-lightbox="group"><img
								src="https://www.sakulife-ikari.com/wp-content/uploads/2021/05/food2102_7.png" alt=""
								class="picture"></a>
						
					</div>

					<div class="add-dish">
						<table border="1">
							<tr>
								<th>主食</th>
								<td>
									<select name="stapleFood" th:value="${stapleFood}" class="form-control">
										<option value="">--選択してください--</option>
										<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}"
											th:text="${i} +'つ'" th:selected="${i == stapleFood}">
										</option>
									</select>

								</td>
							</tr>
							<tr>
								<th>副菜</th>
								<td>
									<select name="sideDish" th:value="${sideDish}" class="form-control">
										<option value="">--選択してください--</option>
										<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}"
											th:text="${i} +'つ'" th:selected="${i == sideDish}">
										</option>
									</select>
								</td>
							</tr>
							<tr>
								<th>主菜</th>
								<td>
									<select name="mainDish" th:value="${mainDish}" class="form-control">
										<option value="">--選択してください--</option>
										<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}"
											th:text="${i} +'つ'" th:selected="${i == mainDish}">
										</option>
									</select>
								</td>
							</tr>
							<tr>
								<th>乳製品</th>
								<td>
									<select name="milkDish" th:value="${milkDish}" class="form-control">
										<option value="">--選択してください--</option>
										<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}"
											th:text="${i} +'つ'" th:selected="${i == milkDish}">
										</option>
									</select>
								</td>
							</tr>
							<tr>
								<th>果物</th>
								<td>
									<select name="fruitCount" th:value="${fruitCount}" class="form-control">
										<option value="">--選択してください--</option>
										<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}"
											th:text="${i} +'つ'" th:selected="${i == fruitCount}">
										</option>
									</select>
								</td>
							</tr>

						</table>
					</div>
					<button type="submit" formmethod="get" formaction="/dishes/note" class="button-note">
						詳細登録
					</button>
					<br><br><br><br>
					<button class="normal"><a href="/dishes/add">登録</a></button>
				</form>

			</div>
		</main>
		<hr>
		<footer th:replace="~{footer}"></footer>
	</body>

	</html>
