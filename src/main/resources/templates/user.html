<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>食事バランスガイド</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<header>
		<h1>食事バランスガイド</h1>
	</header>
	<main>
		<h2>新規登録</h2>
		<form action="/users/add" method="post">
			<ul th:if="${addErrorList}" class="error">
				<li th:each="error:${addErrorList}" th:text="${error}"></li>
			</ul>
			<input type="text" name="email" th:value="${email}" placeholder="メールアドレス"><br>
			<input type="text" name="name" th:value="${name}" placeholder="名前"><br>
			<input type="text" name="password" th:value="${password}" placeholder="パスワード"><br>
			<input type="text" name="age" th:value="${age}" placeholder="年齢"><br>
			<select name="gender" th:value="${gender}" th:selected="${gender}">

				<option value="">--選択してください--</option>
				<option value="1">男</option>
				<option value="2">女</option>

			</select><br><br>
			<button>登録</button>
		</form>
	</main>
</body>

</html>
