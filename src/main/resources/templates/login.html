<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>食事バランスガイド</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<header>
		<h1>食事バランスガイド</h1>
	</header>
	<main>
		<h2>ログイン</h2>
		<form action="/login" method="post">
			<ul th:if="${errorList}" class="error">
				<li th:each="error:${errorList}" th:text="${error}"></li>
			</ul>

			<input type="text" name="email" th:value="${email}" placeholder="メールアドレス"><br>
			<input type="password" name="password" th:value="${password}" placeholder="パスワード"><br>
			<button>ログイン</button>
			<br> <span th:text="${message}" style="color: red"></span>
		</form>
		<br>
		<a href="/users/add">新規会員登録はこちら</a>
	</main>

</body>

</html>
