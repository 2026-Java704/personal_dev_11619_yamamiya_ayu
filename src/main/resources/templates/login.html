<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<header>
			<h1>食事バランスガイド</h1>
		</header>
			<main>
				<form action="/login" method="post">
					<ul th:if="${errorList}" class="error">
									<li th:each="error:${errorList}" th:text="${error}"></li>
								</ul>

					<input type="text" name="email" th:value="${email}" placeholder="メールアドレス"><br>
					<input type="text" name="password" th:value="${password}" placeholder="パスワード"><br>
					<button>ログイン</button>
					<br> <span th:text="${message}" style="color: red"></span>
				</form>
				<br>
				<a href="/users/add">新規会員登録はこちら</a>
			</main>

</body>
</html>
