<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>食事バランスガイド</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<main>
		<header>
			<h1>食事バランスガイド</h1>
		</header>
		<h2>登録内容一覧</h2>
		<table border="1">

			<tr>
				<th>日付</th>
				<th>主食</th>
				<th>副菜</th>
				<th>主菜</th>
				<th>乳製品</th>
				<th>果物</th>
				<th>メモ</th>
				<th>点数</th>
				<th>更新</th>
			</tr>

			<tr th:each="record:${results}">
				<td th:text="${record.recordDate}"></td>
				<td>
					<span th:text="${record.stapleFood} + つ"></span><br>
					<span th:text="${record.stapleFood >= 5 && record.stapleFood <= 7 ? '〇' : '✕'} "></span>
				</td> 
				<td>
					<span th:text="${record.sideDish} + つ"></span><br>
					<span th:text="${record.sideDish >= 5 && record.sideDish <= 6 ? '〇' : '✕'} "></span>
				</td>
				<td>
					<span th:text="${record.mainDish} + つ"></span><br>
					<span th:text="${record.mainDish >= 5 && record.mainDish <= 7 ? '〇' : '✕'} "></span>
				</td>
				<td>
					<span th:text="${record.milkDish} + つ"></span><br>
					<span th:text="${record.milkDish >= 5 && record.milkDish <= 7 ? '〇' : '✕'} "></span>
				</td>
				<td>
					<span th:text="${record.fruitCount} + つ"></span><br>
					<span th:text="${record.fruitCount >= 5 && record.fruitCount <= 7 ? '〇' : '✕'} "></span>
				</td>
				<td th:text="${record.detailMemo}"></td>
				<td th:text="${record.achievement}"></td>
				<td>
					<form th:action="'/dishes/'+${record.id}+'/edit'" method="get">
						<input type="submit" value="更新">
					</form>
				</td>
			</tr>
		</table>
		<a href="/dishes/add">新規登録</a><br>
		<a href="/logout">ログアウト</a>
	</main>
</body>

</html>
