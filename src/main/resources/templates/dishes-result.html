<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>食事バランスガイド</title>
</head>

<body>
	<main>
		<h1>登録内容一覧</h1>
		<table border="1">
			<tr>
				<th>日付</th>
				<th>主食</th>
				<th>副菜</th>
				<th>主菜</th>
				<th>乳製品</th>
				<th>果物</th>
				<th>メモ</th>
				<th>点数</th>
				<th></th>
				<th></th>
			</tr>
			
<!--			表示されない-->
			<tr th:each="record:${dishList}">
				<td th:text="${record.recordDate}"></td>
				<td th:text="${record.stapleFood}"></td>
				<td th:text="${record.sideDish}"></td>
				<td th:text="${record.mainDish}"></td>
				<td th:text="${record.milkDish}"></td>
				<td th:text="${record.FruitCount}"></td>
				<td th:text="${record.detailMemo}"></td>
				<td>
					<form th:action="'/dishes/'+${result.id}+'/edit'" method="get">
						<input type="submit" value="更新">
					</form>
				</td>
				</tr>

		</table>

		<a href="/dishes/add"><button>新規登録</button></a><br>
		<a href="/logout">ログアウト</a>

		</form>
	</main>


</body>

</html>
