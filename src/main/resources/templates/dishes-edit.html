<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>食事バランスガイド</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<header>
		<h1>食事バランスガイド</h1>
	</header>
	<main>
		<h2>更新</h2>

		<form th:action="@{/dishes/{id}/edit(id=${result.id})}" method="post">
			<ul th:if="${errorList != null}">
				<li th:each="error : ${errorList}" th:text="${error}"></li>
			</ul>

			<table border="1">

				<tr>
					<th>日付</th>
					<td>
						<input type="date" name="recordDate" th:value="${result.recordDate}">
					</td>
				</tr>
				<tr>
					<th>主食</th>
					<td>
						<select name="stapleFood">
							<option value="">--選択してください--</option>
							<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'"
								th:selected="${i == result.stapleFood}">
							</option>
						</select>
					</td>
				</tr>

				<tr>
					<th>副菜</th>
					<td>
						<select name="sideDish">
							<option value="">--選択してください--</option>
							<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'"
								th:selected="${i == result.sideDish}">
							</option>
						</select>
					</td>
				</tr>

				<tr>
					<th>主菜</th>
					<td>
						<select name="mainDish">
							<option value="">--選択してください--</option>
							<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'"
								th:selected="${i == result.mainDish}">
							</option>
						</select>
					</td>
				</tr>

				<tr>
					<th>乳製品</th>
					<td>
						<select name="milkDish">
							<option value="">--選択してください--</option>
							<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'"
								th:selected="${i == result.milkDish}">
							</option>
						</select>
					</td>
				</tr>

				<tr>
					<th>果物</th>
					<td>
						<select name="fruitCount">
							<option value="">--選択してください--</option>
							<option th:each="i : ${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'"
								th:selected="${i == result.fruitCount}">
							</option>
						</select>
					</td>
				</tr>

				<tr>
					<th>メモ</th>
					<td>
						<textarea name="detailMemo" rows="5" cols="30" th:text="${result.detailMemo}"></textarea>
					</td>
				</tr>
			</table>
			<br>
			<button>更新</button>
		</form>
		<br>
		<a href="/dishes/result">一覧に戻る</a>
	</main>
	<hr>
	<footer th:replace="~{footer}"></footer>
</body>

</html>
